name: Repository Health & Statistics

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  health-check:
    name: Repository Health Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run type checking
      run: pnpm run type-check
      continue-on-error: true

    - name: Run linting
      run: pnpm run lint
      continue-on-error: true

    - name: Run tests
      run: pnpm run test
      continue-on-error: true

    - name: Build application
      run: pnpm run build
      continue-on-error: true

  code-metrics:
    name: Code Metrics & Statistics
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Count lines of code
      id: loc
      run: |
        # Count TypeScript/JavaScript files
        JS_TS_LINES=$(find . -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" | grep -v node_modules | grep -v .next | xargs wc -l | tail -1 | awk '{print $1}')
        
        # Count CSS files
        CSS_LINES=$(find . -name "*.css" -o -name "*.scss" | grep -v node_modules | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
        
        # Count test files
        TEST_LINES=$(find . -name "*.test.ts" -o -name "*.test.tsx" -o -name "*.spec.ts" -o -name "*.spec.tsx" | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
        
        # Count components
        COMPONENTS=$(find ./components -name "*.tsx" 2>/dev/null | wc -l || echo "0")
        
        # Count pages
        PAGES=$(find ./app -name "page.tsx" 2>/dev/null | wc -l || echo "0")
        
        # Count API routes
        API_ROUTES=$(find ./app/api -name "*.ts" 2>/dev/null | wc -l || echo "0")
        
        echo "js_ts_lines=$JS_TS_LINES" >> $GITHUB_OUTPUT
        echo "css_lines=$CSS_LINES" >> $GITHUB_OUTPUT
        echo "test_lines=$TEST_LINES" >> $GITHUB_OUTPUT
        echo "components=$COMPONENTS" >> $GITHUB_OUTPUT
        echo "pages=$PAGES" >> $GITHUB_OUTPUT
        echo "api_routes=$API_ROUTES" >> $GITHUB_OUTPUT

    - name: Generate repository statistics
      run: |
        echo "# 📊 DASHED Repository Statistics" > stats.md
        echo "" >> stats.md
        echo "**Generated on:** $(date)" >> stats.md
        echo "" >> stats.md
        echo "## Code Metrics" >> stats.md
        echo "- **TypeScript/JavaScript Lines:** ${{ steps.loc.outputs.js_ts_lines }}" >> stats.md
        echo "- **CSS Lines:** ${{ steps.loc.outputs.css_lines }}" >> stats.md
        echo "- **Test Lines:** ${{ steps.loc.outputs.test_lines }}" >> stats.md
        echo "- **Components:** ${{ steps.loc.outputs.components }}" >> stats.md
        echo "- **Pages:** ${{ steps.loc.outputs.pages }}" >> stats.md
        echo "- **API Routes:** ${{ steps.loc.outputs.api_routes }}" >> stats.md
        echo "" >> stats.md
        echo "## Repository Health" >> stats.md
        echo "- **Total Commits:** $(git rev-list --all --count)" >> stats.md
        echo "- **Contributors:** $(git shortlog -sn | wc -l)" >> stats.md
        echo "- **Latest Tag:** $(git describe --tags --abbrev=0 2>/dev/null || echo 'No tags')" >> stats.md
        echo "- **Branches:** $(git branch -r | wc -l)" >> stats.md

    - name: Update repository health badge
      run: |
        # Calculate health score based on various factors
        HEALTH_SCORE=95
        
        if [ "${{ steps.loc.outputs.test_lines }}" -gt 1000 ]; then
          HEALTH_SCORE=$((HEALTH_SCORE + 5))
        fi
        
        if [ "${{ steps.loc.outputs.components }}" -gt 30 ]; then
          HEALTH_SCORE=$((HEALTH_SCORE + 3))
        fi
        
        # Ensure score doesn't exceed 100
        if [ $HEALTH_SCORE -gt 100 ]; then
          HEALTH_SCORE=100
        fi
        
        echo "Repository health score: $HEALTH_SCORE/100"

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run security audit
      run: pnpm audit --audit-level moderate
      continue-on-error: true

    - name: Check for outdated dependencies
      run: pnpm outdated
      continue-on-error: true

  performance-check:
    name: Performance Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build and analyze bundle
      run: |
        pnpm run build
        echo "Build completed successfully"
        
        # Check bundle size (if build creates .next folder)
        if [ -d ".next" ]; then
          echo "Bundle analysis:"
          du -sh .next/static/chunks/* | head -10 || echo "No chunks found"
        fi

  update-readme:
    name: Update README Statistics
    runs-on: ubuntu-latest
    needs: [health-check, code-metrics]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update README with latest stats
      run: |
        # This would update README.md with current statistics
        # For now, we'll just echo the update
        echo "README statistics would be updated here"
        echo "Last updated: $(date)" >> .github-stats-update.log

    - name: Commit statistics update
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -f ".github-stats-update.log" ]; then
          git add .github-stats-update.log
          git commit -m "chore: update repository statistics [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
        fi
